name: Continuous Integration

on:
  push:
    branches: [ main, develop, 'beta/**' ]
  pull_request:
    branches: [ main, develop, 'beta/**' ]

permissions:
  contents: read

jobs:
  # Electron app (HiDock Meeting Intelligence) — primary product
  test-electron:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: |
          apps/electron/package-lock.json
          packages/*/package-lock.json

    # file:-linked @hidock/* packages. --ignore-scripts avoids npm running a
    # linked sibling's `prepare` (tsup) before that sibling has its devDeps
    # (connectors-slack -> file:../connectors). npm rebuild restores the
    # skipped native install scripts (better-sqlite3 Node-ABI copy in
    # packages/database, usb prebuilds). Alphabetical build order already
    # places connectors before connectors-slack.
    - name: Install workspace packages
      run: |
        for d in packages/*/; do
          echo "== npm ci: $d"
          (cd "$d" && npm ci --ignore-scripts && npm rebuild)
        done

    - name: Build workspace packages
      run: |
        for d in packages/*/; do
          echo "== build: $d"
          (cd "$d" && npm run build --if-present)
        done

    - name: Install electron app dependencies
      working-directory: ./apps/electron
      run: npm ci

    - name: Typecheck
      working-directory: ./apps/electron
      run: npm run typecheck

    - name: Lint
      working-directory: ./apps/electron
      run: npm run lint

    - name: Test
      working-directory: ./apps/electron
      run: npm run test:run

  # Web Application Tests
  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: apps/web/package-lock.json

    - name: Install dependencies
      working-directory: ./apps/web
      run: npm ci

    - name: Lint
      working-directory: ./apps/web
      run: npm run lint

    - name: Run tests
      working-directory: ./apps/web
      run: npm run test

    - name: Build
      working-directory: ./apps/web
      run: npm run build

  # Security Scanning
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4

    - name: npm audit (web)
      working-directory: ./apps/web
      run: npm audit --audit-level=moderate

    - name: npm audit (electron, production deps)
      working-directory: ./apps/electron
      run: npm audit --omit=dev --audit-level=moderate

    # Informational until the Dependabot backlog for the Python apps is worked
    # through (see repo Security tab); tighten to blocking afterwards.
    - name: pip-audit (desktop, informational)
      continue-on-error: true
      uses: pypa/gh-action-pip-audit@v1.0.8
      with:
        inputs: apps/desktop/

# NOTE: the legacy desktop (Python) test job is intentionally absent — the
# suite currently fails collection (missing tests/helpers module, tracked).
# Re-add a test-desktop matrix job once `pytest` passes in apps/desktop.
